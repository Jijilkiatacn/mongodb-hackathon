<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Predictive Maintenance — Live Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0f4f8;
    color: #1a202c;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 24px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1a202c;
    color: #fff;
    border-radius: 10px;
    padding: 18px 24px;
    margin-bottom: 24px;
  }

  header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.01em; }
  header .sub { font-size: 13px; color: #a0aec0; margin-top: 3px; }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #68d391;
    font-weight: 600;
  }

  .live-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #68d391;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  .machines {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .machine-card {
    background: #fff;
    border-radius: 10px;
    padding: 20px;
    border: 2px solid #e2e8f0;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .machine-card.alert {
    border-color: #fc8181;
    box-shadow: 0 0 0 4px rgba(252, 129, 74, 0.12);
  }

  .machine-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .machine-id { font-size: 18px; font-weight: 700; color: #2d3748; }

  .status-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .status-badge.healthy { background: #c6f6d5; color: #276749; }

  .status-badge.alert {
    background: #fed7d7;
    color: #c53030;
    animation: blink 1.2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .readings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }

  .reading { background: #f7fafc; border-radius: 8px; padding: 12px; }
  .reading .label { font-size: 11px; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .reading .value { font-size: 28px; font-weight: 700; color: #2d3748; line-height: 1; }
  .reading .value.alert-value { color: #e53e3e; }
  .reading .unit { font-size: 13px; color: #a0aec0; font-weight: 400; }

  .sparkline { width: 100%; height: 50px; display: block; }

  .diagnosis-box {
    margin-top: 14px;
    background: #fff5f5;
    border: 1px solid #feb2b2;
    border-radius: 8px;
    padding: 14px;
  }

  .diagnosis-box .failure-label {
    font-size: 12px;
    font-weight: 700;
    color: #c53030;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .diagnosis-box .recommendation {
    font-size: 14px;
    color: #2d3748;
    line-height: 1.55;
  }

  .feed-panel {
    background: #fff;
    border-radius: 10px;
    padding: 20px;
    border: 2px solid #e2e8f0;
  }

  .feed-panel h2 {
    font-size: 14px;
    font-weight: 700;
    color: #4a5568;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 14px;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.05em; padding: 0 12px 8px 0; border-bottom: 2px solid #e2e8f0; }
  td { padding: 10px 12px 10px 0; border-bottom: 1px solid #f0f4f8; color: #4a5568; vertical-align: top; }
  tr:last-child td { border-bottom: none; }

  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    background: #edf2f7;
    color: #4a5568;
  }
  .tag.diagnosis { background: #ebf8ff; color: #2b6cb0; }
  .tag.alert { background: #fff5f5; color: #c53030; }

  .empty { color: #a0aec0; font-size: 13px; padding: 20px 0; text-align: center; }

  #server-time { font-size: 12px; color: #a0aec0; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Predictive Maintenance Dashboard</h1>
    <div class="sub">MongoDB Atlas · AI Agent · Real-time Monitoring</div>
  </div>
  <div style="text-align:right">
    <div class="live-badge"><span class="live-dot"></span> LIVE</div>
    <div id="server-time" style="margin-top:4px">--:--:--</div>
  </div>
</header>

<div class="machines" id="machines"></div>

<div class="feed-panel">
  <h2>Agent Activity Feed</h2>
  <div id="feed"></div>
</div>

<script>
function sparklineSvg(history, field, isAlerting) {
  if (!history || history.length < 2) return '';
  const values = history.map(h => h[field]).filter(v => v != null);
  if (values.length < 2) return '';
  const min = Math.min(...values), max = Math.max(...values);
  const range = (max - min) || 1;
  const W = 300, H = 46, p = 4;
  const pts = values.map((v, i) => {
    const x = p + (i / (values.length - 1)) * (W - p * 2);
    const y = H - p - ((v - min) / range) * (H - p * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const color = isAlerting ? '#e53e3e' : '#48bb78';
  return `<svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function renderMachines(machines) {
  document.getElementById('machines').innerHTML = machines.map(m => {
    const alert = m.status === 'alert';
    const c = m.current;
    const temp = c.temperature_c != null ? c.temperature_c.toFixed(1) : '--';
    const vib  = c.vibration_mm_s  != null ? c.vibration_mm_s.toFixed(2)  : '--';

    const diagHtml = alert && m.diagnosis ? `
      <div class="diagnosis-box">
        <div class="failure-label">⚠ ${m.diagnosis.matched_failure_type.replace(/_/g,' ')} &nbsp;·&nbsp; ${(m.diagnosis.similarity_score*100).toFixed(0)}% match</div>
        <div class="recommendation">${m.diagnosis.recommendation || ''}</div>
      </div>` : '';

    return `
      <div class="machine-card ${alert ? 'alert' : ''}">
        <div class="machine-header">
          <div class="machine-id">${m.machine_id}</div>
          <div class="status-badge ${alert ? 'alert' : 'healthy'}">${alert ? '⚠ Alert' : '✓ Healthy'}</div>
        </div>
        <div class="readings">
          <div class="reading">
            <div class="label">Temperature</div>
            <div class="value ${alert ? 'alert-value' : ''}">${temp}<span class="unit"> °C</span></div>
          </div>
          <div class="reading">
            <div class="label">Vibration</div>
            <div class="value ${alert ? 'alert-value' : ''}">${vib}<span class="unit"> mm/s</span></div>
          </div>
        </div>
        ${sparklineSvg(m.history, 'temperature_c', alert)}
        ${diagHtml}
      </div>`;
  }).join('');
}

function renderFeed(feed) {
  const el = document.getElementById('feed');
  if (!feed.length) {
    el.innerHTML = '<div class="empty">No agent activity yet.</div>';
    return;
  }
  const rows = feed.map(item => {
    const time = new Date(item.timestamp).toLocaleTimeString();
    const isAlert = item.alert_sent;
    const isDiag  = item.agent === 'diagnosis_agent';
    let detail = item.event;
    if (item.event === 'diagnosis_complete') {
      detail = isAlert
        ? `Alert — matched <strong>${item.matched_failure_type}</strong>`
        : 'No alert — below confidence threshold';
    } else if (item.event === 'anomaly_flagged') {
      detail = 'Anomaly detected → handing off to Diagnosis Agent';
    } else if (item.event === 'check_ok') {
      detail = 'All readings within normal range';
    }
    return `<tr>
      <td>${time}</td>
      <td><strong>${item.machine_id || '--'}</strong></td>
      <td><span class="tag ${isDiag ? 'diagnosis' : ''}">${(item.agent||'').replace('_agent','')}</span></td>
      <td class="${isAlert ? 'tag alert' : ''}">${detail}</td>
    </tr>`;
  }).join('');
  el.innerHTML = `<table>
    <thead><tr><th>Time</th><th>Machine</th><th>Agent</th><th>Event</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

async function poll() {
  try {
    const data = await fetch('/api/status').then(r => r.json());
    renderMachines(data.machines);
    renderFeed(data.feed);
    document.getElementById('server-time').textContent = new Date(data.server_time).toLocaleTimeString();
  } catch (e) { console.error(e); }
}

poll();
setInterval(poll, 3000);
</script>
</body>
</html>
